version: '3.8'

services:
  jenkins:
    # Constrói a partir do Dockerfile local para instalar o Docker CLI
    build: .
    image: jenkins-docker-cli:latest

    container_name: jenkins

    restart: unless-stopped

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    user: root

volumes:
  jenkins_home: